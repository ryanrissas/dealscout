services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: dealscout
      POSTGRES_PASSWORD: dealscout
      POSTGRES_DB: dealscout
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dealscout"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://dealscout:dealscout@db:5432/dealscout?schema=public
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: change-me-in-production
      APP_URL: http://localhost:3000
      CRON_SECRET: change-me-too
    ports:
      - "3000:3000"

  worker:
    build: .
    command: sh -c "sleep 15 && npm run worker"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://dealscout:dealscout@db:5432/dealscout?schema=public
      APP_URL: http://app:3000
      CRON_SECRET: change-me-too
      INGEST_CRON: "*/30 * * * *"

volumes:
  pgdata:
